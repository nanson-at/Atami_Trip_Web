<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 熱海・箱根・伊豆自駕4天行程</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Onsen & Seascape Theme Variables */
            --bg-color: #f0fdfa;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-1: #0ea5e9;
            --accent-2: #14b8a6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(14, 165, 233, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.1), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(20, 184, 166, 0.1), transparent 50%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            background: var(--accent-1);
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            background: var(--accent-2);
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('img/hero_bg.png');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #1304de, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp 1s ease-out;
            text-shadow: 0 4px 10px rgba(255, 255, 255, 0.5);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeUp 1s ease-out 0.2s backwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        html {
            scroll-behavior: smooth;
        }

        /* Sticky Navigation Bar */
        .sticky-nav {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: -30px auto 40px auto;
            max-width: max-content;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(14, 165, 233, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.15);
            animation: fadeUp 1s ease-out 0.4s backwards;
            flex-wrap: wrap;
        }

        .nav-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        /* Itinerary Timeline & Image Layout */
        .container {
            max-width: 1200px;
            margin: -50px auto 100px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .image-column {
            position: sticky;
            top: 100px;
            height: calc(100vh - 140px);
            min-height: 400px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .viewer-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

        .viewer-placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--accent-1);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        #viewer-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #viewer-img:hover {
            transform: scale(1.05);
        }

        #viewer-img.loaded {
            opacity: 0.85;
        }

        .viewer-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.95));
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
            transform: translateY(100%);
            transition: transform 0.4s ease;
            text-align: center;
        }

        .viewer-title.show {
            transform: translateY(0);
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.1);
            transform: translateY(40px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .day-card.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .day-card:hover {
            border-color: rgba(14, 165, 233, 0.6);
            box-shadow: 0 25px 50px rgba(14, 165, 233, 0.15), 0 0 40px rgba(14, 165, 233, 0.2);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.3);
        }

        .day-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .day-num {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .day-name {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .day-date {
            color: var(--accent-1);
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* Stops List */
        .stops-list {
            list-style: none;
            position: relative;
        }

        .stops-list::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-1), rgba(14, 165, 233, 0.1));
        }

        .stop-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stop-item:hover {
            background: rgba(14, 165, 233, 0.05);
            transform: translateX(10px);
        }

        .stop-icon {
            width: 42px;
            height: 42px;
            background: #fff;
            border: 2px solid var(--accent-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            z-index: 2;
            color: var(--accent-1);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
            transition: transform 0.3s ease;
        }

        .stop-item:hover .stop-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-1);
            color: #fff;
        }

        .stop-content {
            flex-grow: 1;
        }

        .stop-name {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .stop-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .tag {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .mapcode {
            display: inline-flex;
            align-items: center;
            font-size: 0.8rem;
            color: #0369a1;
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 5px;
            max-width: max-content;
        }

        .mapcode i {
            margin-right: 5px;
            font-size: 0.7rem;
        }

        .copy-btn {
            background: rgba(14, 165, 233, 0.15);
            border: none;
            color: #0369a1;
            cursor: pointer;
            margin-left: 8px;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: rgba(14, 165, 233, 0.8);
            color: #fff;
            transform: scale(1.05);
        }

        .drive-time {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-1);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 0 10px 30px;
            margin-left: 10px;
            border-left: 2px dashed rgba(14, 165, 233, 0.4);
        }

        .gmap-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.2s ease;
            vertical-align: middle;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .gmap-btn img {
            width: 16px;
            height: 16px;
        }

        .gmap-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .image-column {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }

            .day-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .day-card {
                padding: 25px;
            }
        }

        /* Lightbox Modal */
        .lightbox-overlay {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.show {
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            object-fit: contain;
        }

        .lightbox-overlay.show .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lightbox-close:hover {
            color: var(--accent-1);
        }

        .lightbox-caption {
            margin-top: 20px;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="bg-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="hero">
        <div>
            <h1>2026 熱海・箱根・伊豆 自駕之旅</h1>
            <!--<p>享受無拘無束的四天三夜日本靜岡與神奈川海岸絕美公路旅行</p>-->
        </div>
    </header>

    <nav class="sticky-nav" id="day-nav">
        <!-- Navigation injected by JS -->
    </nav>

    <main class="container">
        <div class="timeline-column" id="itinerary-container">
            <!-- Content injected by JS -->
        </div>
        <div class="image-column">
            <div class="sticky-image-viewer" id="image-viewer">
                <div class="viewer-placeholder" id="viewer-placeholder" style="display: none;">
                    <i class="fa-solid fa-image"></i>
                    <p>點擊左側行程預覽當地景色</p>
                </div>
                <img id="viewer-img" class="loaded" src="img/cover.png" alt="2026 熱海・箱根・伊豆 自駕之旅"
                    onclick="openLightbox(this.src, '2026 熱海・箱根・伊豆 自駕之旅')">
                <div class="viewer-title" id="viewer-title"></div>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script>
        const itineraryData = [
            {
                day: "Day 0",
                date: "6/25 - 6/26",
                title: "品川住宿",
                stops: [
                    { name: "品川プリンスホテル", desc: "Shinagawa Prince Hotel / 品川王子大飯店", icon: "fa-solid fa-hotel", isTag: "住宿" }
                ]
            },
            {
                day: "Day 1",
                date: "6/27",
                title: "箱根出發",
                stops: [
                    { name: "熱海駅 / 品川駅", desc: "從車站準備出發", icon: "fa-solid fa-train", mapcode: "116 685 183*71", driveNext: "5 分鐘 (步行/短程客運)" },
                    { name: "Orix Rent-a-car 熱海駅前店", desc: "取車開始自駕", icon: "fa-solid fa-car", isTag: "租車", mapcode: "116 685 183*71", driveNext: "約 35 分鐘" },
                    { name: "塔之澤 一之湯本館", desc: "Tōnosawa Ichinoyu Honkan", icon: "fa-solid fa-house", mapcode: "57 221 527*12", driveNext: "約 25 分鐘" },
                    { name: "蘆之湖海盜船", desc: "建議購買 Hakone Free Pass", icon: "fa-solid fa-ship", mapcode: "50 569 111*66", driveNext: "約 15 分鐘" },
                    { name: "大涌谷", desc: "大涌谷遊客中心", icon: "fa-solid fa-volcano", mapcode: "57 242 689*24", driveNext: "約 20 分鐘" },
                    { name: "箱根神社", desc: "水上鳥居美景", icon: "fa-brands fa-torii-gate", mapcode: "57 123 162*12", driveNext: "約 10 分鐘" },
                    { name: "駒ヶ岳ロープウェー", desc: "箱根園駅纜車", icon: "fa-solid fa-cable-car", mapcode: "57 151 168*25", driveNext: "約 1 小時" },
                    { name: "Fashion Center Shimamura", desc: "伊東店購物", icon: "fa-solid fa-cart-shopping", mapcode: "488 644 100" }
                ]
            },
            {
                day: "Day 2",
                date: "6/28",
                title: "伊東 / 大室山",
                stops: [
                    { name: "伊豆シャボテンヴィレッジ", desc: "豪華露營 Glamping", icon: "fa-solid fa-campground", isTag: "住宿", mapcode: "488 552 483*05", driveNext: "約 15 分鐘" },
                    { name: "門脇吊橋", desc: "門脇吊橋觀景台", icon: "fa-solid fa-bridge-water", mapcode: "488 497 390*43", driveNext: "約 15 分鐘" },
                    { name: "大室山", desc: "搭乘纜車看火山口", icon: "fa-solid fa-mountain", mapcode: "488 551 117*77", driveNext: "約 5 分鐘" },
                    { name: "伊豆シャボテン動物公園", desc: "水豚君泡湯", icon: "fa-solid fa-otter", mapcode: "488 552 483*05", driveNext: "約 15 分鐘" },
                    { name: "城崎海岸 & 一碧湖", desc: "自然絕美海岸與湖景", icon: "fa-solid fa-water", mapcode: "116 058 124*86", driveNext: "約 15 分鐘" },
                    { name: "伊豆ぐらんぱる公園", desc: "伊豆Granpal遊樂園", icon: "fa-solid fa-face-grin-stars", mapcode: "488 554 268*63", driveNext: "約 0 分鐘 (同地點)" },
                    { name: "伊豆高原グランイルミ", desc: "Granillumi 夜間燈光秀", icon: "fa-solid fa-lightbulb", mapcode: "488 554 268*63", driveNext: "約 10 分鐘" },
                    { name: "CAINZ Izu Kōgen", desc: "大型量販店購物", icon: "fa-solid fa-basket-shopping", mapcode: "488 528 200" }
                ]
            },
            {
                day: "Day 3",
                date: "6/29",
                title: "下田海岸",
                stops: [
                    { name: "The Lighthouse Seaside Inn", desc: "下田海景住宿", icon: "fa-solid fa-hotel", isTag: "住宿", mapcode: "633 292 839*17", driveNext: "約 5 分鐘" },
                    { name: "白浜海岸", desc: "Shirahama Beach", icon: "fa-solid fa-umbrella-beach", mapcode: "248 087 303*66", driveNext: "約 15 分鐘" },
                    { name: "ペリーロード", desc: "培理之路 (Perry Road)", icon: "fa-solid fa-shoe-prints", mapcode: "248 023 140*18", driveNext: "約 15 分鐘" },
                    { name: "龍宮窟", desc: "Ryugu Sea Cave 自然海蝕洞", icon: "fa-solid fa-camera", mapcode: "633 200 577*81", driveNext: "約 20 分鐘" },
                    { name: "Shimamura 服飾店", desc: "思夢樂買買買", icon: "fa-solid fa-bag-shopping", mapcode: "633 174 200" }
                ]
            },
            {
                day: "Day 4",
                date: "6/30",
                title: "熱海市區",
                stops: [
                    { name: "熱海銀座商店街", desc: "歷史悠久的商店街", icon: "fa-solid fa-shop", mapcode: "116 654 159*58", driveNext: "約 35 分鐘" },
                    { name: "Shimamura 購物", desc: "大仁店", icon: "fa-solid fa-cart-shopping", mapcode: "116 610 200", driveNext: "約 40 分鐘" },
                    { name: "來宮神社", desc: "Kinomiya Shrine 千年大楠樹", icon: "fa-brands fa-torii-gate", mapcode: "116 653 585*12", driveNext: "約 5 分鐘" },
                    { name: "熱海サンビーチ", desc: "熱海陽光海灘 (Atami Sun Beach)", icon: "fa-solid fa-sun", mapcode: "116 654 347*66" }
                ]
            }
        ];

        const container = document.getElementById('itinerary-container');
        const navContainer = document.getElementById('day-nav');
        let globalIndex = 0;

        itineraryData.forEach((dayData, index) => {
            // Create navigation button
            const navBtn = document.createElement('a');
            navBtn.href = `#day-${index}`;
            navBtn.className = 'nav-btn';
            if (index === 0) navBtn.classList.add('active'); // active by default for the first one
            navBtn.innerText = dayData.day;

            navBtn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
            });
            navContainer.appendChild(navBtn);

            const card = document.createElement('div');
            card.className = 'day-card';
            card.id = `day-${index}`;
            card.style.scrollMarginTop = '100px'; // Prevent sticky nav from covering the card

            let stopsHtml = '';
            dayData.stops.forEach((stop, i) => {
                const currentIdx = globalIndex++;
                const tagHtml = stop.isTag ? `<span class="tag">${stop.isTag}</span>` : '';

                // Construct Google Maps search URL
                const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.name)}`;
                const navBtnHtml = `<a href="${gmapsUrl}" target="_blank" class="gmap-btn" title="在 Google Maps 中定位" onclick="event.stopPropagation()"><img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" alt="Google Maps"></a>`;

                const mapcodeHtml = stop.mapcode ? `<div class="mapcode"><i class="fa-solid fa-map-location-dot"></i> MAPCODE: <span style="margin-right: 2px; margin-left: 5px;">${stop.mapcode}</span><button class="copy-btn" onclick="copyMapCode('${stop.mapcode}', this, event)" title="複製 MAPCODE"><i class="fa-regular fa-copy"></i></button></div>` : '';
                let driveHtml = '';
                if (stop.driveNext) {
                    driveHtml = `<div class="drive-time"><i class="fa-solid fa-car"></i> 車程 ${stop.driveNext}</div>`;
                }

                const safeName = stop.name.replace(/'/g, "\\'");
                stopsHtml += `
                    <li class="stop-item" onclick="showImage('${safeName}', ${currentIdx})" title="點擊預覽 ${stop.name} 景色">
                        <div class="stop-icon"><i class="${stop.icon}"></i></div>
                        <div class="stop-content">
                            <div class="stop-name">${stop.name} ${tagHtml} ${navBtnHtml}</div>
                            <div class="stop-desc">${stop.desc}</div>
                            ${mapcodeHtml}
                        </div>
                    </li>
                    ${driveHtml}
                `;
            });

            card.innerHTML = `
                <div class="day-header">
                    <div class="day-title">
                        <span class="day-num">${dayData.day}</span>
                        <h2 class="day-name">${dayData.title}</h2>
                    </div>
                    <div class="day-date"><i class="fa-regular fa-calendar-days" style="margin-right: 8px;"></i>${dayData.date}</div>
                </div>
                <ul class="stops-list">
                    ${stopsHtml}
                </ul>
            `;
            container.appendChild(card);
        });

        // Intersection Observer for Scroll Animations
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.day-card').forEach(card => {
            observer.observe(card);
        });

        // Copy MAPCODE functionality
        function copyMapCode(text, btn, e) {
            if (e) e.stopPropagation();
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.querySelector('i');
                const originalClass = icon.className;
                icon.className = 'fa-solid fa-check';
                btn.style.color = '#34d399';

                setTimeout(() => {
                    icon.className = originalClass;
                    btn.style.color = '';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert("複製失敗，可能需要 HTTPS 環境。此為您的代碼：" + text);
            });
        }

        // Image Viewer functionality
        function showImage(name, idx) {
            // On mobile, bypass the hidden side column and open lightbox directly
            if (window.innerWidth <= 900) {
                openLightbox(`img/image_${idx}.jpg`, name);
                return;
            }

            const placeholder = document.getElementById('viewer-placeholder');
            const img = document.getElementById('viewer-img');
            const title = document.getElementById('viewer-title');

            if (placeholder) placeholder.style.display = 'none';
            img.classList.remove('loaded');
            title.classList.remove('show');

            // local image rendering based on global sequential index
            img.src = `img/image_${idx}.jpg`;
            img.alt = name;

            img.onload = () => {
                img.classList.add('loaded');
                title.innerText = name;
                title.classList.add('show');
            };

            // Add click event for Lightbox
            img.onclick = () => openLightbox(img.src, name);
        }

        // Lightbox functionality
        function openLightbox(src, name) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');

            lightboxImg.src = src;
            lightboxCaption.innerText = name;

            lightbox.style.display = 'flex';
            // small delay to allow display flex to apply before opacity transition
            setTimeout(() => lightbox.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e && e.target.id === 'lightbox-img') return;
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = '';

            setTimeout(() => {
                if (!lightbox.classList.contains('show')) {
                    lightbox.style.display = 'none';
                }
            }, 300);
        }
    </script>
</body>

</html>
